*{box-sizing:border-box;margin:0;padding:0}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideRight{from{transform:translateX(100%);opacity:0.5}to{transform:translateX(0);opacity:1}}
@keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes glow{0%,100%{opacity:0.25}50%{opacity:0.45}}
@keyframes bellShake{0%{transform:rotate(0)}15%{transform:rotate(12deg)}30%{transform:rotate(-10deg)}45%{transform:rotate(8deg)}60%{transform:rotate(-6deg)}75%{transform:rotate(3deg)}100%{transform:rotate(0)}}
@keyframes notifSlide{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.tile{display:flex;flex-direction:column;align-items:center;gap:10px;background:none;border:none;cursor:pointer;padding:14px 6px;border-radius:20px;position:relative;transition:transform 0.18s cubic-bezier(0.34,1.56,0.64,1);outline:none;-webkit-tap-highlight-color:transparent}
.tile:active{transform:scale(0.85)!important}
.tile-icon{width:62px;height:62px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;transition:box-shadow 0.3s}
.tile-name{color:#C9CDD3;font-size:11px;font-weight:500;text-align:center;line-height:1.2;max-width:76px}
.badge{position:absolute;top:-5px;right:-8px;color:#fff;font-size:8px;font-weight:800;letter-spacing:0.5px;padding:2px 7px;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,0.4)}
.status-chip{position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);color:#fff;font-size:7px;font-weight:700;letter-spacing:0.7px;padding:2px 8px;border-radius:4px;white-space:nowrap}
.notif-badge{position:absolute;top:-3px;right:-3px;min-width:16px;height:16px;border-radius:8px;background:#EF4444;color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;box-shadow:0 2px 6px rgba(239,68,68,0.4)}
.featured-btn{flex:0 0 auto;display:flex;align-items:center;gap:9px;border-radius:13px;padding:9px 14px 9px 9px;cursor:pointer;white-space:nowrap;border:none;transition:transform 0.2s}
.featured-btn:active{transform:scale(0.95)}
.cat-btn{padding:7px 13px;border-radius:9px;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all 0.2s;outline:none;font-family:inherit}
.search-result{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:13px;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.035);cursor:pointer;text-align:left;width:100%;font-family:inherit;transition:background 0.2s}

// ── Helpers ──
function el(tag,attrs,...children){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')e.className=v;
    else if(k==='innerHTML')e.innerHTML=v;
    else e.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false)return;
    e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(c):c);
  });
  return e;
}

function getTime(){
  const now=new Date();
  return{
    h:now.getHours().toString().padStart(2,'0'),
    m:now.getMinutes().toString().padStart(2,'0'),
    d:now.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'})
  };
}

// ── Permission API helpers ──
async function requestPermission(permId){
  try{
    if(permId==='notifications'&&'Notification' in window){
      const r=await Notification.requestPermission();
      return r==='granted'?'granted':'denied';
    }
    if(permId==='camera'||permId==='microphone'){
      const constraints=permId==='camera'?{video:true}:{audio:true};
      const stream=await navigator.mediaDevices.getUserMedia(constraints);
      stream.getTracks().forEach(t=>t.stop());
      return 'granted';
    }
    if(permId==='location'&&'geolocation' in navigator){
      return new Promise(res=>{
        navigator.geolocation.getCurrentPosition(()=>res('granted'),()=>res('denied'),{timeout:5000});
      });
    }
    if(permId==='storage'&&navigator.storage&&navigator.storage.persist){
      const r=await navigator.storage.persist();
      return r?'granted':'denied';
    }
  }catch(e){return 'denied';}
  return 'pending';
}

function handleTap(app){
  if(app.id==='builder')setState({showConstructor:true});
  else setState({selectedApp:app});
}

// ── Main Render ──
function render(){
  const root=document.getElementById('app');
  root.innerHTML='';
  const t=getTime();
  const items=state.filter==='all'?APPS:APPS.filter(a=>a.cat===state.filter);

  const bg=el('div',{style:{minHeight:'100vh',background:'radial-gradient(ellipse at 25% 15%,#12082a 0%,#0A0E1A 45%,#060810 100%)',position:'relative',overflow:'hidden'}},[
    el('div',{style:{position:'absolute',top:'-15%',left:'-8%',width:'50%',height:'50%',background:'radial-gradient(circle,rgba(139,92,246,0.07) 0%,transparent 65%)',animation:'glow 9s ease-in-out infinite',pointerEvents:'none'}}),
    el('div',{style:{position:'absolute',bottom:'-10%',right:'-8%',width:'45%',height:'45%',background:'radial-gradient(circle,rgba(6,182,212,0.05) 0%,transparent 65%)',animation:'glow 11s ease-in-out 3s infinite',pointerEvents:'none'}}),
    el('div',{style:{position:'absolute',inset:0,opacity:0.015,pointerEvents:'none',backgroundImage:'radial-gradient(circle,#fff 1px,transparent 1px)',backgroundSize:'28px 28px'}}),

      el('div',{style:{textAlign:'center',marginBottom:'28px',animation:'tIn 0.5s ease 0.05s both'}},[
        el('div',{style:{fontSize:'72px',fontWeight:200,color:'#E2E8F0',letterSpacing:'-4px',lineHeight:1,fontVariantNumeric:'tabular-nums'},innerHTML:`${t.h}<span style="opacity:0.25;font-weight:100">:</span>${t.m}`}),
        el('div',{style:{fontSize:'13px',color:'#2D3340',fontWeight:400,textTransform:'capitalize',marginTop:'6px',letterSpacing:'0.3px'}},t.d)]),
      // Featured
      el('div',{style:{display:'flex',gap:'9px',marginBottom:'24px',overflowX:'auto',padding:'0 0 4px',animation:'tIn 0.5s ease 0.08s both'}},
        APPS.filter(a=>a.featured).map(app=>{
          const nc=state.notifications.filter(n=>n.app===app.id&&n.unread).length;
          return el('button',{className:'featured-btn',style:{background:`linear-gradient(135deg,${app.gr[0]}12,${app.gr[1]}06)`,border:`1px solid ${app.gr[0]}20`,position:'relative'},onClick:()=>handleTap(app)},[
            el('div',{style:{width:'34px',height:'34px',borderRadius:'9px',background:`linear-gradient(140deg,${app.gr[0]},${app.gr[1]})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'15px',position:'relative'}},[
              document.createTextNode(app.icon),
              nc>0?el('div',{className:'notif-badge',style:{top:'-5px',right:'-5px',minWidth:'14px',height:'14px',fontSize:'8px'}},String(nc)):null,
            ]),
            el('div',{style:{textAlign:'left'}},[
              el('div',{style:{color:'#C9CDD3',fontSize:'11px',fontWeight:600}},app.name),
              el('div',{style:{color:'#3B4252',fontSize:'9px'}},app.id==='builder'?'Crea tu negocio':app.status==='live'?'Abrir':'Pronto')])])})),
      // Filters
      el('div',{style:{display:'flex',gap:'6px',marginBottom:'18px',overflowX:'auto',animation:'tIn 0.5s ease 0.1s both'}},
        CATS.map(c=>el('button',{className:'cat-btn',style:{background:state.filter===c.id?'rgba(139,92,246,0.14)':'rgba(255,255,255,0.025)',border:`1px solid ${state.filter===c.id?'rgba(139,92,246,0.28)':'rgba(255,255,255,0.04)'}`,color:state.filter===c.id?'#C4B5FD':'#3B4252',fontFamily:'inherit'},onClick:()=>setState({filter:c.id})},c.l))),
      // Grid
      el('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'2px',justifyItems:'center',flex:1}},items.map((app,i)=>renderTile(app,i))),
      // Footer
      el('div',{style:{textAlign:'center',marginTop:'auto',paddingTop:'36px',animation:'tIn 0.6s ease 0.6s both'}},[
        el('div',{style:{color:'rgba(255,255,255,0.02)',fontSize:'8px',letterSpacing:'3px',fontWeight:600,textTransform:'uppercase'}},'Mawddi / iKROX Technologies')]),
    ]),
  ]);
  root.appendChild(bg);

  // Overlays
  const search=renderSearch();if(search)root.appendChild(search);
  const notifs=renderNotifications();if(notifs)root.appendChild(notifs);
  const perms=renderPermissions();if(perms)root.appendChild(perms);
  const constr=renderConstructor();if(constr)root.appendChild(constr);
  const modal=renderAppModal();if(modal)root.appendChild(modal);

  // Install banner
  if(state.showInstall){
    root.appendChild(el('div',{style:{position:'fixed',bottom:0,left:0,right:0,zIndex:150,background:'linear-gradient(135deg,#4F46E5ee,#7C3AEDee)',backdropFilter:'blur(20px)',padding:'13px 14px',display:'flex',alignItems:'center',justifyContent:'center',gap:'10px',animation:'slideUp 0.5s cubic-bezier(0.16,1,0.3,1)',borderTop:'1px solid rgba(255,255,255,0.1)'}},[

// ── Init ──
render();
setInterval(render,60000);
setInterval(()=>{try{document.querySelector('[data-clock]')&&render()}catch(e){}},1000);

// ── Request notification permission on first load ──
if('Notification' in window && Notification.permission==='default'){
  setTimeout(()=>{
    // Will be triggered when user interacts, not automatically
    console.log('[iKROX] Notification permission pending — will request on first app interaction');
  },2000);
}

// ── Service Worker registration stub ──
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js').then(reg=>{
      console.log('[iKROX] Service Worker registered:', reg.scope);
    }).catch(e=>{
      console.log('[iKROX] SW registration pending — sw.js not deployed yet');
    });
  });
}
